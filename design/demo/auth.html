<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · MemoTree</title>
  <link rel="stylesheet" href="assets/demo.css" />
  <style>
    /* 登录页：双栏。左侧是品牌情绪板（一张温暖的家庭照片 + 衬线品牌字），
       右侧是极简表单。不要 ghost-card 居中卡片那种 SaaS 默认。*/
    .auth {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      min-height: 100vh;
    }
    @media (max-width: 880px) {
      /* 移动端：情绪板不隐藏，改成顶部 banner，保留品牌入口的温度 */
      .auth { grid-template-columns: 1fr; grid-template-rows: 32vh 1fr; }
      .auth__aside { min-height: 32vh; }
      .auth__brand {
        left: var(--space-6);
        bottom: var(--space-5);
      }
      .auth__brand h1 { font-size: clamp(34px, 9vw, 48px); }
      .auth__brand p { font-size: var(--text-base); }
      .auth__main { padding: var(--space-8) var(--space-6); }
    }

    /* 左：情绪板 */
    .auth__aside {
      position: relative;
      overflow: hidden;
      background: oklch(0.30 0.02 45);
    }
    .auth__aside img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.92;
    }
    .auth__aside::after {
      /* 左侧渐隐，保证右侧表单读起来不挤 */
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        oklch(0.15 0.02 40 / 0.55) 0%,
        oklch(0.15 0.02 40 / 0.1) 50%,
        transparent 100%
      );
    }
    .auth__brand {
      position: absolute;
      left: var(--space-12);
      bottom: var(--space-12);
      z-index: 2;
      color: var(--paper-raised);
    }
    .auth__brand h1 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(40px, 6vw, 64px);
      letter-spacing: var(--tracking-display);
      line-height: 1;
      margin: 0 0 var(--space-3);
    }
    .auth__brand h1 em {
      font-style: italic;
      color: var(--caramel);
      font-weight: 400;
    }
    .auth__brand p {
      font-family: var(--font-display);
      font-style: italic;
      font-size: var(--text-lg);
      margin: 0;
      max-width: 22ch;
      line-height: var(--leading-snug);
      opacity: 0.92;
    }

    /* 右：表单 */
    .auth__main {
      display: grid;
      align-content: center;
      padding: var(--space-12) var(--space-6);
    }
    .auth__card {
      width: min(100%, 380px);
      margin-inline: auto;
    }
    .auth__heading {
      margin-bottom: var(--space-8);
    }
    .auth__heading h2 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: var(--text-2xl);
      letter-spacing: var(--tracking-display);
      margin: var(--space-2) 0 0;
      color: var(--ink);
    }

    .auth__form {
      display: grid;
      gap: var(--space-5);
    }
    .auth__submit { margin-top: var(--space-2); width: 100%; }
    .auth__switch {
      margin-top: var(--space-6);
      text-align: center;
      font-size: var(--text-sm);
      color: var(--ink-soft);
    }
    .auth__switch button {
      background: none;
      border: 0;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font: inherit;
    }
    .auth__switch button:hover { color: var(--accent-press); }

    .auth__divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-8) 0;
      color: var(--ink-faint);
      font-size: var(--text-xs);
    }
    .auth__divider::before,
    .auth__divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--hairline);
    }

    .auth__invite-note {
      display: grid;
      gap: var(--space-2);
      padding: var(--space-4);
      background: var(--accent-tint);
      border-radius: var(--radius-md);
      color: var(--accent-ink);
      font-size: var(--text-sm);
      line-height: var(--leading-snug);
    }
    .auth__invite-note strong { font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth">

    <!-- 左侧情绪板 -->
    <aside class="auth__aside">
      <img src="https://picsum.photos/seed/family-warm/1200/1600" alt="" />
      <div class="auth__brand">
        <h1>Memo<em>Tree</em></h1>
        <p>家人每天打开看看宝宝近况。</p>
      </div>
    </aside>

    <!-- 右侧表单 -->
    <main class="auth__main">
      <div class="auth__card">

        <div class="auth__heading">
          <span class="eyebrow-brand">欢迎回来</span>
          <h2>回到小满的家</h2>
        </div>

        <form class="auth__form" onsubmit="return false">
          <label class="field">
            <span class="field__label">登录名</span>
            <input class="input" type="text" placeholder="手机号或用户名" autocomplete="username" />
          </label>
          <label class="field">
            <span class="field__label">密码</span>
            <input class="input" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>

          <button class="btn btn--primary auth__submit" type="submit">登 录</button>
        </form>

        <p class="auth__switch">
          还没账号？<button>通过家人邀请加入</button>
        </p>

        <div class="auth__divider">或者</div>

        <div class="auth__invite-note">
          <strong>第一次来？</strong>
          家人需要先邀请你。让家里管事的人生成一条邀请链接发给你，点开后就能注册加入。
        </div>

      </div>
    </main>

  </div>

  <nav class="demo-nav" aria-label="demo 页面切换">

    <a href="media-detail.html" aria-label="详情"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg><span class="demo-nav__label">详情</span></a>
    <a href="upload.html" aria-label="上传"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span class="demo-nav__label">上传</span></a>
    <a href="invite.html" aria-label="邀请"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11l-3-3-3 3"/><path d="M19 8v8"/></svg><span class="demo-nav__label">邀请</span></a>
    <a href="auth.html" class="is-current" aria-label="登录"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="demo-nav__label">登录</span></a>
  </nav>

</body>
</html>
